version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: meus-clientes-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meusclientes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meusclientes123}
      POSTGRES_DB: ${POSTGRES_DB:-meusclientes}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U meusclientes']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
